<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
      color: #e0e0ff;
    }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.8rem;
      color: #a0a0ff;
      font-weight: 600;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 10px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1e2d5a;
      transform: scale(1.04);
    }

    .cell.x { color: #e94560; }
    .cell.o { color: #4cc9f0; }

    .cell.win {
      background: #0f3460;
      box-shadow: 0 0 18px 4px rgba(160, 160, 255, 0.4);
    }

    #reset {
      margin-top: 2rem;
      padding: 0.7rem 2.2rem;
      font-size: 1rem;
      border: none;
      border-radius: 8px;
      background: #e94560;
      color: white;
      cursor: pointer;
      font-weight: 600;
      letter-spacing: 0.05em;
      transition: background 0.15s, transform 0.1s;
    }

    #reset:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    #scores {
      display: flex;
      gap: 2.5rem;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .score-box {
      text-align: center;
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 10px;
      padding: 0.5rem 1.2rem;
    }

    .score-box .label { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }
    .score-box .val   { font-size: 1.6rem; font-weight: bold; }
    .score-box.x-box .val { color: #e94560; }
    .score-box.o-box .val { color: #4cc9f0; }
    .score-box.d-box .val { color: #aaa; }
  </style>
</head>
<body>

  <h1>Tic Tac Toe</h1>

  <div id="scores">
    <div class="score-box x-box">
      <div class="label">X Wins</div>
      <div class="val" id="scoreX">0</div>
    </div>
    <div class="score-box d-box">
      <div class="label">Draws</div>
      <div class="val" id="scoreD">0</div>
    </div>
    <div class="score-box o-box">
      <div class="label">O Wins</div>
      <div class="val" id="scoreO">0</div>
    </div>
  </div>

  <div id="status">Player X's turn</div>

  <div id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <button id="reset">New Game</button>

<script>
  const WINS = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

  let board, current, over, scores;

  function init() {
    board = Array(9).fill(null);
    current = 'X';
    over = false;
    scores = scores || { X: 0, O: 0, D: 0 };
    render();
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    if (board.every(v => v)) return { winner: null, line: [] };
    return null;
  }

  function render() {
    const cells = document.querySelectorAll('.cell');
    const result = checkWinner();

    cells.forEach((cell, i) => {
      const val = board[i];
      cell.textContent = val || '';
      cell.className = 'cell' + (val ? ` ${val.toLowerCase()} taken` : '');
      if (result && result.line.includes(i)) cell.classList.add('win');
    });

    const status = document.getElementById('status');
    if (result) {
      if (result.winner) {
        status.textContent = `Player ${result.winner} wins!`;
      } else {
        status.textContent = "It's a draw!";
      }
    } else {
      status.textContent = `Player ${current}'s turn`;
    }

    document.getElementById('scoreX').textContent = scores.X;
    document.getElementById('scoreO').textContent = scores.O;
    document.getElementById('scoreD').textContent = scores.D;
  }

  document.getElementById('board').addEventListener('click', e => {
    const cell = e.target.closest('.cell');
    if (!cell || over) return;
    const i = parseInt(cell.dataset.i);
    if (board[i]) return;

    board[i] = current;
    const result = checkWinner();

    if (result) {
      over = true;
      if (result.winner) scores[result.winner]++;
      else scores.D++;
    } else {
      current = current === 'X' ? 'O' : 'X';
    }

    render();
  });

  document.getElementById('reset').addEventListener('click', () => {
    over = false;
    init();
  });

  init();
</script>
</body>
</html>
